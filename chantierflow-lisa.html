<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ChantierFlow — Les Jardins de Lisa</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --b0:#0c0e14;--b1:#131620;--b2:#1a1e2c;--b3:#232838;--b4:#2c3248;--bd:#2e3450;
  --t:#e4e6f0;--t2:#8a90aa;--t3:#5c6280;
  --or:#f59e0b;--ord:rgba(245,158,11,.12);--r:#ef4444;--g:#22c55e;--bl:#3b82f6;
  --R:8px;
  --row-h:26px;
  --header-h:44px;
  --toolbar-h:40px;
  --left-w:260px;
  --mini-w:48px;
  --safe-b:env(safe-area-inset-bottom);
  --safe-t:env(safe-area-inset-top);
  --DW:2.5;
}
.light{--b0:#ffffff;--b1:#f8f9fc;--b2:#f0f1f5;--b3:#e5e7ee;--b4:#d1d5e0;--bd:#c8ccd8;--t:#111827;--t2:#4b5563;--t3:#6b7280;--or:#d97706;--ord:rgba(217,119,6,.08)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;position:fixed;width:100%;top:0;left:0}
body{font-family:'DM Sans',sans-serif;background:var(--b0);color:var(--t);display:flex;flex-direction:column;touch-action:manipulation}
.mono{font-family:'JetBrains Mono',monospace}

.hdr{background:var(--b1);border-bottom:1px solid var(--bd);padding:8px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;padding-top:calc(8px + var(--safe-t));height:calc(var(--header-h) + var(--safe-t))}
.hdr .burger{background:none;border:none;color:var(--t);font-size:20px;cursor:pointer;padding:4px 8px;display:none}
.hdr-logo{width:32px;height:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.hdr-logo svg{width:32px;height:32px}
.hdr h1{font-size:13px;font-weight:700;line-height:1.1}.hdr h1 b{color:var(--or)}
.hdr-sub{font-size:9px;color:var(--t2);line-height:1.1}
.hdr-act{margin-left:auto;display:flex;gap:4px}
.hdr-act button{background:var(--b3);border:1px solid var(--bd);color:var(--t2);padding:5px 9px;border-radius:14px;font-size:10px;cursor:pointer;white-space:nowrap}
.hdr-act button.on{background:var(--ord);border-color:var(--or);color:var(--or)}

.tbar{display:flex;gap:5px;padding:6px 12px;flex-wrap:nowrap;align-items:center;background:var(--b1);border-bottom:1px solid var(--bd);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.chip{padding:5px 12px;font:500 11px/1 inherit;border-radius:14px;background:var(--b3);border:1px solid var(--bd);color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0;min-height:28px}
.chip.on{background:var(--ord);border-color:var(--or);color:var(--or)}
.chip-sep{width:1px;height:18px;background:var(--bd);flex-shrink:0}

.ibar{display:flex;align-items:center;gap:8px;padding:5px 12px;background:var(--b2);border-bottom:1px solid var(--bd);font-size:10px;color:var(--t2);flex-shrink:0;overflow-x:auto}
.ibar input[type=range]{width:100px;accent-color:var(--or);flex-shrink:0}
.ibar .v{font:700 14px 'JetBrains Mono',monospace;color:var(--or);min-width:28px}

.main{flex:1;display:flex;overflow:hidden;position:relative;min-height:0}

.gleft{flex-shrink:0;width:var(--left-w);background:var(--b1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.gleft-scroll{flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y}
.gleft-hd{height:var(--toolbar-h);background:var(--b3);display:flex;align-items:center;padding:0 8px;font-size:9px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;border-bottom:1px solid var(--bd)}

.gmini{flex-shrink:0;width:var(--mini-w);background:var(--b1);border-right:1px solid var(--bd);display:none;flex-direction:column;overflow:hidden}
.gmini-scroll{flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y}
.gmini-hd{height:var(--toolbar-h);background:var(--b3);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--t2);flex-shrink:0;border-bottom:1px solid var(--bd)}
.gmini .mrow{height:var(--row-h);display:flex;align-items:center;justify-content:center;gap:2px;border-bottom:1px solid rgba(46,52,80,.15);font-size:8px;font-weight:700;color:var(--t2);cursor:pointer;user-select:none}
.gmini .mrow.sum{background:var(--b2)}
.gmini .mrow .dot{width:5px;height:5px;border-radius:50%}

.gr{display:flex;align-items:center;height:var(--row-h);padding:0 8px;gap:4px;border-bottom:1px solid rgba(46,52,80,.15);font-size:10px;white-space:nowrap;overflow:hidden;cursor:pointer;transition:background .1s;user-select:none}
.gr:active{background:rgba(245,158,11,.1)}
.gr.gp{background:var(--b2);font-weight:600;font-size:10.5px}
.gr.sel{background:rgba(245,158,11,.12)!important}
.gr .d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.gr .tg{font-size:7px;padding:1px 4px;border-radius:2px;background:var(--b4);color:var(--t3);flex-shrink:0;min-width:16px;text-align:center}
.gr .nm{overflow:hidden;text-overflow:ellipsis;flex:1}
.gr .sd{font-size:9px;flex-shrink:0}
.gr .arrow{font-size:7px;color:var(--t3);flex-shrink:0;transition:transform .2s;width:8px;text-align:center}
.gr .arrow.open{transform:rotate(90deg)}

.gright{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--b1);min-width:0}
.gright-scroll{flex:1;overflow:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y;position:relative}
.gm-wrap{height:var(--toolbar-h);overflow:hidden;background:var(--b3);border-bottom:1px solid var(--bd);flex-shrink:0}
.gm{display:flex;height:100%}
.gmo{flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--t2);border-right:1px solid rgba(46,52,80,.35)}

.gba{position:relative}
.gbr{height:var(--row-h);position:relative;border-bottom:1px solid rgba(46,52,80,.1)}
.gb{position:absolute;top:3px;height:calc(var(--row-h) - 6px);border-radius:3px;font-size:7.5px;color:#fff;display:flex;align-items:center;padding:0 4px;overflow:hidden;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.3);cursor:pointer;user-select:none;font-weight:600}
.gb.sm{height:6px;top:calc((var(--row-h) - 6px) / 2);border-radius:1px;opacity:.5}
.gb.dn{opacity:.35}
.gb.dragging{cursor:grabbing;filter:brightness(1.3);z-index:20;box-shadow:0 4px 12px rgba(0,0,0,.5);transform:scale(1.02)}
.gb .rh{position:absolute;right:0;top:0;bottom:0;width:10px;cursor:ew-resize;touch-action:none}
.gb-label{position:absolute;font-size:8px;font-weight:600;color:var(--t2);white-space:nowrap;pointer-events:none;top:-1px;transform:translateY(-100%)}
.gbr.sel-row{background:rgba(245,158,11,.05)}

.gtd{position:absolute;top:0;bottom:0;width:2px;background:var(--r);z-index:4;pointer-events:none}
.gtl{position:absolute;top:2px;background:var(--r);color:#fff;font-size:7px;padding:1px 4px;border-radius:2px;transform:translateX(-50%);z-index:5;pointer-events:none;font-weight:700}
.gms{position:absolute;top:0;bottom:0;width:2px;background:var(--g);z-index:3;pointer-events:none;opacity:.7}
.gmsl{position:absolute;color:#fff;font-size:7px;padding:1px 4px;border-radius:2px;transform:translateX(-50%);z-index:3;pointer-events:none;white-space:nowrap;background:var(--g);font-weight:700}

.drawer{position:fixed;left:0;top:calc(var(--header-h) + var(--safe-t));bottom:0;width:280px;background:var(--b1);transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:50;overflow:hidden;display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(0,0,0,.5)}
.drawer.open{transform:translateX(0)}
.drawer-hd{padding:10px 12px;background:var(--b3);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drawer-hd h3{font-size:12px;font-weight:700}
.drawer-hd .x{background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer;padding:0 4px}
.drawer-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;overscroll-behavior-y:contain}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:45;opacity:0;pointer-events:none;transition:opacity .2s}
.backdrop.open{opacity:1;pointer-events:auto}

.bsheet{position:fixed;left:0;right:0;bottom:0;background:var(--b2);border-top-left-radius:16px;border-top-right-radius:16px;padding:10px 16px calc(24px + var(--safe-b));transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:60;max-height:70vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 -4px 24px rgba(0,0,0,.5)}
.bsheet.open{transform:translateY(0)}
.bsheet::before{content:'';display:block;width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 12px;flex-shrink:0}
.bs-title{font-size:16px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.bs-title .dot{width:10px;height:10px;border-radius:50%}
.bs-sub{font-size:11px;color:var(--t2);margin-bottom:14px}
.bs-row{display:flex;gap:10px;margin-bottom:12px}
.bs-field{flex:1}
.bs-field label{display:block;font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;font-weight:600}
.bs-field input{width:100%;padding:8px 10px;font:13px inherit;background:var(--b3);border:1px solid var(--bd);border-radius:var(--R);color:var(--t);outline:none}
.bs-field input:focus{border-color:var(--or)}
.bs-info{font-size:11px;color:var(--t2);padding:10px 0;border-top:1px solid var(--bd);margin-top:8px;line-height:1.6}
.bs-info b{color:var(--t)}
.bs-sts{display:flex;gap:6px;margin:12px 0}
.bs-sts button{flex:1;padding:10px;border:2px solid var(--bd);border-radius:var(--R);background:var(--b3);color:var(--t2);font:600 11px inherit;cursor:pointer;min-height:44px}
.bs-sts button.on-ip{border-color:var(--bl);color:var(--bl);background:rgba(59,130,246,.1)}
.bs-sts button.on-dn{border-color:var(--g);color:var(--g);background:rgba(34,197,94,.1)}
.bs-sts button.on-bl{border-color:var(--r);color:var(--r);background:rgba(239,68,68,.1)}
.bs-sts button.on-ns{border-color:var(--t3);color:var(--t)}

@media(max-width:768px){
  .hdr .burger{display:block}
  .gleft{display:none}
  .gmini{display:flex}
  .hdr h1{font-size:12px}
  .hdr-sub{display:none}
  .hdr-act button{padding:4px 7px;font-size:9px}
}

@media(max-width:900px) and (orientation:landscape){
  .hdr .burger{display:none}
  .gleft{display:flex;width:180px}
  .gmini{display:none}
  :root{--left-w:180px}
}

body.rh-S{--row-h:22px}
body.rh-L{--row-h:36px}

.toast{position:fixed;bottom:calc(20px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(100px);background:var(--b4);color:var(--t);padding:10px 18px;border-radius:20px;font-size:12px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:80;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Print header */
.print-header{display:none;padding:10px 14px;border-bottom:2px solid #111;align-items:center;gap:12px}
.print-header svg{width:36px;height:36px;color:#111}
.print-header .ph-text{flex:1}
.print-header .ph-title{font:700 14px 'DM Sans',sans-serif;color:#111}
.print-header .ph-sub{font:400 10px 'DM Sans',sans-serif;color:#444}
.print-header .ph-cabinet{font:300 11px 'DM Sans',sans-serif;color:#111;letter-spacing:1.5px;text-transform:uppercase;text-align:right}
.print-legend{display:none;flex-wrap:wrap;gap:8px;padding:8px 14px;border-top:2px solid #111;margin-top:8px}
.print-legend span{display:flex;align-items:center;gap:4px;font-size:9px}
.print-legend .dot{width:10px;height:10px;border-radius:2px;print-color-adjust:exact;-webkit-print-color-adjust:exact}
@media print{
  @page{size:A3 landscape;margin:10mm}
  body{background:#fff!important;color:#111827!important;margin:0;padding:0}
  .hdr,.tbar,.ibar,.hdr-act,.gleft,.gm-wrap,.drawer,.backdrop,.bsheet,.toast,.undo-bar,.gmini{display:none!important}
  .print-header{display:flex!important}
  .print-legend{display:flex!important}
  .main{overflow:visible!important}
  .gright,.gright-scroll{overflow:visible!important}
  .gright-scroll{border:1px solid #000;page-break-after:avoid}
  .gl,.gr,.gm,.gmo{background:#fff!important;color:#111827!important;border-color:#d1d5db!important}
  .gb{print-color-adjust:exact;-webkit-print-color-adjust:exact;border:1px solid #374151!important;color:#fff!important}
  .gb.sm{border:1px solid #6b7280!important}
  .gms,.gtd,.gtl{display:none}
}

function pushUndo(){var s=snap();if(HISTORY.length&&HISTORY[HISTORY.length-1]===s)return;HISTORY.push(s);if(HISTORY.length>50)HISTORY.shift();REDO_STACK=[];_modified=true;updateUndoUI()}
function undo(){if(HISTORY.length<=1)return;REDO_STACK.push(HISTORY.pop());var s=JSON.parse(HISTORY[HISTORY.length-1]),m={};for(var i=0;i<s.length;i++)m[s[i].id]=s[i];for(var i=0;i<T.length;i++){var sv=m[T[i].id];if(sv){T[i].name=sv.name;T[i].s=sv.s;T[i].f=sv.f;T[i].sts=sv.sts;T[i].dur=dd(D(sv.s),D(sv.f))}}recalc();render();updateUndoUI();toast('Annulé')}
function redo(){if(!REDO_STACK.length)return;var r=REDO_STACK.pop();HISTORY.push(r);var s=JSON.parse(r),m={};for(var i=0;i<s.length;i++)m[s[i].id]=s[i];for(var i=0;i<T.length;i++){var sv=m[T[i].id];if(sv){T[i].name=sv.name;T[i].s=sv.s;T[i].f=sv.f;T[i].sts=sv.sts;T[i].dur=dd(D(sv.s),D(sv.f))}}recalc();render();updateUndoUI();toast('Rétabli')}
function forceSave(){try{localStorage.setItem('cf_v5',snap())}catch(e){}_modified=false;_lastSaveSnap=snap();updateUndoUI();toast('Sauvegardé ✓')}
function updateUndoUI(){var u=document.getElementById('undoBtn'),r=document.getElementById('redoBtn');if(u)u.disabled=HISTORY.length<=1;if(r)r.disabled=!REDO_STACK.length;var c=document.getElementById('undoCount');if(c)c.textContent='↩ '+Math.max(0,HISTORY.length-1)+' | ↪ '+REDO_STACK.length}
function saveSt(){pushUndo();try{localStorage.setItem('cf_v5',snap())}catch(e){}_modified=false;updateUndoUI()}
function loadSt(){try{var r=localStorage.getItem('cf_v5');if(!r)return;var sv=JSON.parse(r),m={};for(var i=0;i<sv.length;i++)m[sv[i].id]=sv[i];for(var i=0;i<T.length;i++){var s=m[T[i].id];if(s){T[i].name=s.name;T[i].s=s.s;T[i].f=s.f;T[i].sts=s.sts||'ns';T[i].dur=dd(D(s.s),D(s.f))}}}catch(e){}}

/* Theme */
var isDark=true;
function toggleTheme(){isDark=!isDark;document.body.classList.toggle('light',!isDark);var b=document.getElementById('themeBtn');if(b)b.textContent=isDark?'☀ Clair':'🌙 Sombre'}

// ═════ Project key from URL ═════
var URL_PARAMS=new URLSearchParams(window.location.search);
var PROJ_KEY=URL_PARAMS.get('projet')||'lisa';
var STORAGE_KEY=PROJ_KEY==='lisa'?'cf_v5':'cf_status_'+PROJ_KEY;
var PROJ_NAME='Les Jardins de Lisa';
var PROJ_SUB='Ozoir-la-Ferrière — 141 logements';

function loadCustomProject(){
  if(PROJ_KEY==='lisa')return false;
  var raw=localStorage.getItem('cf_proj_'+PROJ_KEY);
  if(!raw){alert('Projet introuvable. Retour à l\'accueil.');window.location.href='index.html';return true}
  try{
    var data=JSON.parse(raw);
    if(!data.tasks||!data.config){alert('Projet corrompu.');return true}
    T=data.tasks.map(function(t,i){
      return {id:i,name:t.name,g:t.g,b:t.b||'',s:t.s,f:t.f,
        dur:dd(D(t.s),D(t.f)),lv:t.lv||0,sum:!!t.sum,grp:t.grp||'',sub:!!t.sub,sts:t.sts||'ns'};
    });
    nid=T.length;
    PROJ_NAME=data.config.name||'Projet';
    PROJ_SUB=(data.config.promoteur||'')+(data.config.addr?' · '+data.config.addr:'');
    var allS=T.map(function(t){return D(t.s)}).filter(function(d){return d}),
        allF=T.map(function(t){return D(t.f)}).filter(function(d){return d});
    if(allS.length){
      var minS=new Date(Math.min.apply(null,allS)),maxF=new Date(Math.max.apply(null,allF));
      MIN_D=ad(minS,-30);MAX_D=ad(maxF,30);
    }
    GO_SHIFT={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0,I:0,J:0};
    INTEMP=data.config.intemp||0;
    var iv=document.getElementById('iv');if(iv)iv.textContent=INTEMP;
    var isl=document.getElementById('isl');if(isl)isl.value=INTEMP;
    return true;
  }catch(e){alert('Erreur de chargement : '+e.message);return true}
}

// Override save/load to use STORAGE_KEY
saveSt=function(){pushUndo();try{localStorage.setItem(STORAGE_KEY,snap())}catch(e){}_modified=false;updateUndoUI()};
loadSt=function(){try{var r=localStorage.getItem(STORAGE_KEY);if(!r)return;var sv=JSON.parse(r),m={};for(var i=0;i<sv.length;i++)m[sv[i].id]=sv[i];for(var i=0;i<T.length;i++){var s=m[T[i].id];if(s){T[i].name=s.name;T[i].s=s.s;T[i].f=s.f;T[i].sts=s.sts||'ns';T[i].dur=dd(D(s.s),D(s.f))}}}catch(e){}};
forceSave=function(){try{localStorage.setItem(STORAGE_KEY,snap())}catch(e){}_modified=false;_lastSaveSnap=snap();updateUndoUI();toast('Sauvegardé ✓')};

if(PROJ_KEY==='lisa'){build();}else{loadCustomProject();}
recalc();
setTimeout(function(){
  var t=document.querySelector('.hdr h1');if(t&&PROJ_KEY!=='lisa')t.innerHTML='<span style="font-weight:300;letter-spacing:2px">'+PROJ_NAME+'</span>';
  var s=document.querySelector('.hdr-sub');if(s)s.textContent=PROJ_SUB;
  var pt=document.querySelector('.ph-title');if(pt)pt.textContent=PROJ_NAME+(PROJ_SUB?' — '+PROJ_SUB:'');
},10);
for(var i=0;i<T.length;i++){if(T[i].grp)ST.expanded[T[i].grp]=true}
// Initial undo snapshot
HISTORY.push(snap());_lastSaveSnap=snap();updateUndoUI();

function render(){renderTB();renderG();updateBS()}

function renderTB(){
  var h='<button class="chip'+(ST.fB==='all'?' on':'')+'" onclick="flt(\'all\')">Tous</button>';
  ['A','B','C','D','E'].forEach(function(b){h+='<button class="chip'+(ST.fB===b?' on':'')+'" onclick="flt(\''+b+'\')">'+b+'</button>'});
  h+='<button class="chip'+(ST.fB==='SOC'?' on':'')+'" onclick="flt(\'SOC\')">Social</button>';
  h+='<button class="chip'+(ST.fB==='ACC'?' on':'')+'" onclick="flt(\'ACC\')">Acc.</button>';
  h+='<span class="chip-sep"></span>';
  h+='<button class="chip" onclick="eA(1)">Déplier</button><button class="chip" onclick="eA(0)">Replier</button>';
  h+='<span class="chip-sep"></span>';
  h+='<button class="chip" onclick="resetP()">Reset</button>';
  document.getElementById('toolbar').innerHTML=h;
}
function flt(v){ST.fB=v;render()}
function eA(o){for(var k in gs)ST.expanded[k]=!!o;render()}
function bM(tb,f){if(f==='all')return true;if(f==='SOC')return'ABC'.indexOf(tb)>=0||tb==='ABC'||tb==='ALL'||!tb;if(f==='ACC')return'DE'.indexOf(tb)>=0||tb==='DE'||tb==='ALL'||!tb;return tb===f||tb==='ALL'||!tb}
function togG(g,e){if(e){e.stopPropagation()}ST.expanded[g]=!ST.expanded[g];render()}

var gs={};
function renderG(){
  gs={};var vis=[];
  for(var i=0;i<T.length;i++){var t=T[i];if(!bM(t.b,ST.fB)||!t.s)continue;if(t.grp)gs[t.grp]=true;if(t.sub&&t.grp&&!ST.expanded[t.grp])continue;vis.push(t)}

  var totalD=dd(MIN_D,MAX_D),totalW=totalD*DW;
  var mH='';var cur=new Date(MIN_D);
  while(cur<MAX_D){var mE=new Date(cur.getFullYear(),cur.getMonth()+1,0);if(mE>MAX_D)mE=MAX_D;
    mH+='<div class="gmo" style="width:'+(dd(cur,mE)+1)*DW+'px">'+MN[cur.getMonth()]+' '+String(cur.getFullYear()).slice(2)+'</div>';
    cur=new Date(cur.getFullYear(),cur.getMonth()+1,1)}
  document.getElementById('gm').innerHTML=mH;
  document.getElementById('gm').style.width=totalW+'px';

  var lH='',miH='',bH='',tdOff=dd(MIN_D,TODAY)*DW;

  for(var i=0;i<vis.length;i++){
    var t=vis[i],col=GC[t.g]||'#666',iS=t.sum,iE=iS&&t.grp&&gs[t.grp],indent=t.sub?14:(iS?0:6);
    var arrow=iE?'<span class="arrow'+(ST.expanded[t.grp]?' open':'')+'">▶</span>':'';
    var sd=t.sts==='ip'?'🔵':t.sts==='dn'?'✅':t.sts==='bl'?'🔴':'';
    var rc='gr'+(iS?' gp':'')+(t.id===ST.selId?' sel':'');
    var ck=iE?'togG(\''+t.grp+'\',event)':'selT('+t.id+')';
    var bt=t.b&&!iS?'<span class="tg">'+t.b+'</span>':'';

    lH+='<div class="'+rc+'" style="padding-left:'+(4+indent)+'px" onclick="'+ck+'">'+arrow+'<span class="sd">'+sd+'</span>'+(!iS?'<span class="d" style="background:'+col+'"></span>':'')+bt+'<span class="nm">'+t.name+'</span></div>';

    var mbt=t.b||'';if(mbt==='ALL')mbt='·';if(mbt==='ABC')mbt='S';if(mbt==='DE')mbt='A';
    miH+='<div class="mrow'+(iS?' sum':'')+'" onclick="'+ck+'"><span class="dot" style="background:'+col+'"></span><span>'+(mbt||'—')+'</span></div>';

    var bCls='gbr'+(t.id===ST.selId?' sel-row':'');
    bH+='<div class="'+bCls+'" data-tid="'+t.id+'">';
    if(t.rs&&t.rf){
      var rL=dd(MIN_D,t.rs)*DW,rW=Math.max(dd(t.rs,t.rf)*DW,4);
      var cls='gb'+(iS?' sm':'')+(t.sts==='dn'?' dn':'');
      var label=iS?'':getBarLabel(t,rW);
      var floatLbl=(!iS&&needsFloatLabel(rW))?'<div class="gb-label" style="left:'+rL+'px">'+(GSHORT[t.g]||t.g)+(t.b?' '+t.b:'')+'</div>':'';
      bH+=floatLbl;
      bH+='<div class="'+cls+'" style="left:'+rL+'px;width:'+rW+'px;background:'+col+'" data-tid="'+t.id+'" '+(iS?'onclick="togG(\''+t.grp+'\',event)"':'onmousedown="stD(event,'+t.id+')" ontouchstart="stDT(event,'+t.id+')" onclick="selT('+t.id+')"')+'>'+label+(!iS?'<div class="rh" onmousedown="stR(event,'+t.id+')" ontouchstart="stRT(event,'+t.id+')"></div>':'')+'</div>'
    }
    bH+='</div>';
  }

  document.getElementById('gleft').innerHTML=lH;
  document.getElementById('gmini').innerHTML=miH;

  var msH='<div class="gtd" style="left:'+tdOff+'px"></div><div class="gtl" style="left:'+tdOff+'px">Auj.</div>';
  var msS=dd(MIN_D,MOA_S)*DW,msA=dd(MIN_D,MOA_A)*DW;
  msH+='<div class="gms" style="left:'+msS+'px"></div><div class="gmsl" style="left:'+msS+'px;top:1px">MOA Soc.</div>';
  msH+='<div class="gms" style="left:'+msA+'px;opacity:.6"></div><div class="gmsl" style="left:'+msA+'px;top:12px;opacity:.6">MOA Acc.</div>';

  document.getElementById('gright').innerHTML='<div class="gba" style="width:'+totalW+'px">'+msH+bH+'</div>';

  document.getElementById('drawerContent').innerHTML=lH;

  window._vis=vis;
}

function selT(id){ST.selId=id;document.getElementById('bsheet').classList.add('open');updateBS()}
function closeBS(){ST.selId=-1;document.getElementById('bsheet').classList.remove('open');render()}
function gT(id){for(var i=0;i<T.length;i++)if(T[i].id===id)return T[i];return null}
function updateBS(){var t=gT(ST.selId);if(!t){return}
  document.getElementById('bsDot').style.background=GC[t.g]||'#666';
  document.getElementById('bsName').textContent=t.name;
  document.getElementById('bsSub').textContent=(t.g||'?')+' — '+t.b||'all';
  document.getElementById('bsS').value=t.s;document.getElementById('bsF').value=t.f;
  document.getElementById('bsDur').value=t.dur||dd(D(t.s),D(t.f));
  document.getElementById('bsNm').value=t.name;
  var btns=document.querySelectorAll('.bs-sts button');for(var i=0;i<btns.length;i++)btns[i].className='';
  var sm={ns:0,ip:1,dn:2,bl:3};if(sm[t.sts]!==undefined)btns[sm[t.sts]].className='on-'+t.sts;
  var d=t.delta||0;document.getElementById('bsInfo').innerHTML='<b>ID:</b> '+t.id+' | <b>CES:</b> '+t.g+' | <b>Bât:</b> '+t.b+'<br><b>Dates recalées:</b> '+fmt(t.rs)+' → '+fmt(t.rf)+'<br><b>Décalage:</b> '+(d<0?'<span style="color:var(--g)">'+d+'j</span>':d>0?'<span style="color:var(--r)">+'+d+'j</span>':'0j')}
function saveBS(){var t=gT(ST.selId);if(!t)return;t.name=document.getElementById('bsNm').value;t.s=document.getElementById('bsS').value;t.f=document.getElementById('bsF').value;t.dur=dd(D(t.s),D(t.f));recalc();saveSt();render()}
function saveBSDur(){var t=gT(ST.selId);if(!t)return;var d=parseInt(document.getElementById('bsDur').value)||1;t.f=iso(ad(D(t.s),d));t.dur=d;recalc();saveSt();render()}
function setStsBS(s){var t=gT(ST.selId);if(!t)return;t.sts=s;recalc();saveSt();render()}
function resetP(){if(!confirm('Remettre le planning initial ?'))return;localStorage.removeItem(STORAGE_KEY);ST.selId=-1;if(PROJ_KEY==='lisa'){build();}else{loadCustomProject();}recalc();render()}

function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('backdrop').classList.add('open')}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('backdrop').classList.remove('open')}

var dS=null;
function stD(e,id){if(e.target.classList.contains('rh'))return;e.preventDefault();var t=gT(id);if(!t||t.sum)return;e.currentTarget.classList.add('dragging');dS={id:id,sx:e.clientX,os:t.s,of:t.f,mode:'m',bar:e.currentTarget};document.addEventListener('mousemove',onD);document.addEventListener('mouseup',enD)}
function stR(e,id){e.preventDefault();e.stopPropagation();var t=gT(id);if(!t)return;e.currentTarget.parentElement.classList.add('dragging');dS={id:id,sx:e.clientX,os:t.s,of:t.f,mode:'r',bar:e.currentTarget.parentElement};document.addEventListener('mousemove',onD);document.addEventListener('mouseup',enD)}
function onD(e){if(!dS)return;var dx=e.clientX-dS.sx,days=Math.round(dx/DW),t=gT(dS.id);if(!t)return;
  if(dS.mode==='m'){t.s=iso(ad(D(dS.os),days));t.f=iso(ad(D(dS.of),days))}else{var nf=ad(D(dS.of),days);if(nf>D(t.s)){t.f=iso(nf);t.dur=dd(D(t.s),nf)}}recalc();renderG();updateBS()}
function enD(){if(dS&&dS.bar)dS.bar.classList.remove('dragging');dS=null;document.removeEventListener('mousemove',onD);document.removeEventListener('mouseup',enD);saveSt()}

var tS=null,tT=-1;
function stDT(e,id){if(e.target.classList.contains('rh'))return;e.preventDefault();var t=gT(id);if(!t||t.sum)return;tT=setTimeout(function(){navigator.vibrate&&navigator.vibrate(30);tS={id:id,sx:e.touches[0].clientX,os:t.s,of:t.f,mode:'m',bar:e.currentTarget};document.addEventListener('touchmove',onDT);document.addEventListener('touchend',enDT)},400)}
function stRT(e,id){e.preventDefault();e.stopPropagation();var t=gT(id);if(!t)return;tT=setTimeout(function(){navigator.vibrate&&navigator.vibrate(30);tS={id:id,sx:e.touches[0].clientX,os:t.s,of:t.f,mode:'r',bar:e.currentTarget.parentElement};document.addEventListener('touchmove',onDT);document.addEventListener('touchend',enDT)},400)}
function onDT(e){clearTimeout(tT);if(!tS)return;var dx=e.touches[0].clientX-tS.sx,days=Math.round(dx/DW),t=gT(tS.id);if(!t)return;
  if(tS.mode==='m'){t.s=iso(ad(D(tS.os),days));t.f=iso(ad(D(tS.of),days))}else{var nf=ad(D(tS.of),days);if(nf>D(t.s)){t.f=iso(nf);t.dur=dd(D(t.s),nf)}}recalc();renderG();updateBS()}
function enDT(){clearTimeout(tT);tS=null;document.removeEventListener('touchmove',onDT);document.removeEventListener('touchend',enDT);saveSt()}

eA(1);
render();

/* Keyboard shortcuts */
document.addEventListener('keydown',function(e){
  if(e.ctrlKey||e.metaKey){
    if(e.key==='z'){e.preventDefault();undo()}
    else if(e.key==='y'){e.preventDefault();redo()}
    else if(e.key==='s'){e.preventDefault();forceSave()}
    else if(e.key==='='||e.key==='+'){e.preventDefault();if(typeof zoomIn==='function')zoomIn()}
    else if(e.key==='-'){e.preventDefault();if(typeof zoomOut==='function')zoomOut()}
  }
  if(e.key==='Escape'){closeBS();var ep=document.getElementById('epanel');if(ep)ep.classList.remove('open');ST.selId=-1;render()}
});
</script>
